<nav
  class="board board--type-bulletin bulletin"
  [class.header--guest]="!authService.isLoggedIn()"
  [class.header--authenticated]="authService.isLoggedIn()"
>
  <section class="header-brand">
    <figure
      class="header-logo"
      [hidden]="!authService.isLoggedIn()"
      routerLink="/"
      aria-label="Home"
      title="Home"
      (click)="closeMobileMenu()"
    >
      <img src="icon.png" alt="GRIMLEDGER icon" />
    </figure>
    <h1 class="header-title" routerLink="/" (click)="closeMobileMenu()">GRIMLEDGER</h1>
  </section>
  @if (authService.isLoggedIn()) {
    <button
      class="menu-toggle"
      type="button"
      aria-label="Toggle navigation"
      aria-controls="header-nav"
      [attr.aria-expanded]="isMobileMenuOpen()"
      (click)="toggleMobileMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul id="header-nav" class="header-nav" [class.header-nav--open]="isMobileMenuOpen()">
      <li>
        <a
          class="nav-link"
          routerLink="/user"
          aria-label="User"
          title="User"
          (click)="closeMobileMenu()"
        >
          <span class="nav-link__badge">
            <img
              class="nav-icon"
              src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/person-fill.svg"
              alt="User"
            />
          </span>
          <span class="nav-link__label">User</span>
        </a>
      </li>
      <li>
        <a
          class="nav-link"
          routerLink="/manual"
          aria-label="Manual"
          title="Manual"
          (click)="closeMobileMenu()"
        >
          <span class="nav-link__badge">
            <img
              class="nav-icon"
              src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/book-fill.svg"
              alt="Manual"
            />
          </span>
          <span class="nav-link__label">Manual</span>
        </a>
      </li>
      <li>
        <a
          class="nav-link"
          routerLink="/characters"
          aria-label="Mis Personajes"
          title="Mis Personajes"
          (click)="closeMobileMenu()"
        >
          <span class="nav-link__badge">
            <img
              class="nav-icon"
              src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/person-badge-fill.svg"
              alt="Mis Personajes"
            />
          </span>
          <span class="nav-link__label">Personajes</span>
        </a>
      </li>
      <li>
        <a
          class="nav-link"
          routerLink="/campaigns"
          aria-label="Campaigns"
          title="Campaigns"
          (click)="closeMobileMenu()"
        >
          <span class="nav-link__badge">
            <img
              class="nav-icon"
              src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/map-fill.svg"
              alt="Campaigns"
            />
          </span>
          <span class="nav-link__label">Campaigns</span>
        </a>
      </li>
      <li>
        <a
          class="nav-link"
          routerLink="/about"
          aria-label="About us"
          title="About us"
          (click)="closeMobileMenu()"
        >
          <span class="nav-link__badge">
            <img
              class="nav-icon"
              src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/people-fill.svg"
              alt="About us"
            />
          </span>
          <span class="nav-link__label">About us</span>
        </a>
      </li>
      <li>
        <a
          class="nav-link"
          routerLink="/contact"
          aria-label="Contact"
          title="Contact"
          (click)="closeMobileMenu()"
        >
          <span class="nav-link__badge">
            <img
              class="nav-icon"
              src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/envelope-fill.svg"
              alt="Contact"
            />
          </span>
          <span class="nav-link__label">Contact</span>
        </a>
      </li>
      <li>
        <a
          class="nav-link"
          (click)="logout()"
          routerLink="/login"
          aria-label="Logout"
          title="Logout"
        >
          <span class="nav-link__badge">
            <img
              class="nav-icon"
              src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/box-arrow-right.svg"
              alt="Logout"
            />
          </span>
          <span class="nav-link__label">Logout</span>
        </a>
      </li>
    </ul>
  }
</nav>
