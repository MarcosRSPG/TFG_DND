<section class="board board--type-sign sign">
<form (ngSubmit)="register()">
        <label for="inputName" class="form-label">Username:</label>
        <input type="text" id="inputName" [(ngModel)]="name" name="name" required>
        <label for="inputEmail" class="form-label">Email:</label>
        <input type="email" id="inputEmail" [(ngModel)]="email" name="email" required>
        <div class="passwords">
            <div>
        <label for="inputPassword" class="form-label">Password:</label>
        <input type="password" id="inputPassword" [(ngModel)]="password" name="password" required>
        </div>
        <div>
        <label for="inputConfirmPassword" class="form-label">Confirm password:</label>
        <input type="password" id="inputConfirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" required>
    </div>    
    </div>
        
            <button type="submit" class="submitLogin">Register</button>
        
</form>
</section>
