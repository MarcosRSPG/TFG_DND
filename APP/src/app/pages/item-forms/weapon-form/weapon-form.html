<div class="form-container">
  <h2>Create Weapon</h2>

  @if (error()) {
    <p class="error-message">{{ error() }}</p>
  }

  <form (ngSubmit)="onSubmit()">
    <div class="form-section">
      <h3>Basic Information</h3>

      <div class="form-group">
        <label for="name">Name *</label>
        <input
          id="name"
          type="text"
          [(ngModel)]="formData().name"
          name="name"
          required
          placeholder="e.g. Longsword, Shortbow..."
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="weapon-category">Weapon Category *</label>
          <select id="weapon-category" [(ngModel)]="formData().weapon_category" name="weaponCategory" required>
            <option value="">Select category...</option>
            @for (cat of weaponCategories; track cat) {
              <option [value]="cat">{{ cat }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="weapon-range">Range Type *</label>
          <select id="weapon-range" [(ngModel)]="formData().weapon_range" name="weaponRange" required>
            @for (range of weaponRanges; track range) {
              <option [value]="range">{{ range }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="image">Image URL</label>
        <input
          id="image"
          type="text"
          [(ngModel)]="formData().image"
          name="image"
          placeholder="e.g. /assets/weapons/longsword.png"
        />
      </div>
    </div>

    <div class="form-section">
      <h3>Damage</h3>

      <div class="damage-input-row">
        <div class="form-group">
          <label for="damage-count">Count</label>
          <input
            id="damage-count"
            type="number"
            [ngModel]="damageCount()"
            (ngModelChange)="damageCount.set($event)"
            name="damageCount"
            min="1"
            max="10"
            placeholder="e.g. 1"
          />
        </div>

        <div class="form-group">
          <label for="damage-dice">Dice *</label>
          <select id="damage-dice" [(ngModel)]="formData().damage!.damage_dice" name="damageDice" required>
            @for (die of damageDice; track die) {
              <option [value]="die">{{ die }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="damage-type">Damage Type *</label>
          <select id="damage-type" [ngModel]="formData().damage!.damage_type?.index" (ngModelChange)="formData.update(d => ({ ...d, damage: { ...d.damage!, damage_type: { index: $event, name: $event, url: '/api/2014/damage-types/' + $event } } }))" name="damageType" required>
            <option value="">Select type...</option>
            @for (dtype of damageTypes; track dtype.index) {
              <option [value]="dtype.index">{{ dtype.name }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="range-normal">Normal Range</label>
          <input
            id="range-normal"
            type="number"
            [(ngModel)]="formData().range!.normal"
            name="rangeNormal"
            min="0"
            placeholder="e.g. 5"
          />
        </div>

        <div class="form-group">
          <label for="range-long">Long Range</label>
          <input
            id="range-long"
            type="number"
            [(ngModel)]="formData().range!.long"
            name="rangeLong"
            min="0"
            placeholder="e.g. 10"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Properties</label>
        <div class="properties-grid">
          @for (prop of weaponProperties; track prop.index) {
            <label class="property-label">
              <input
                type="checkbox"
                [checked]="hasProperty(prop.index)"
                (change)="toggleProperty(prop.index)"
              />
              <span>{{ prop.name }}</span>
            </label>
          }
        </div>
      </div>

      @if (hasProperty('versatile')) {
        <div class="two-handed-damage-row">
          <div class="form-group">
            <label for="twohand-count">Count</label>
            <input
              id="twohand-count"
              type="number"
              [ngModel]="twoHandedDamageCount()"
              (ngModelChange)="twoHandedDamageCount.set($event)"
              name="twoHandedDamageCount"
              min="1"
              max="10"
              placeholder="e.g. 2"
            />
          </div>

          <div class="form-group">
            <label for="twohand-dice">Two-Handed Dice</label>
            <select id="twohand-dice" [(ngModel)]="formData().two_handed_damage!.damage_dice" name="twohandDice">
              @for (die of damageDice; track die) {
                <option [value]="die">{{ die }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label for="twohand-type">Two-Handed Type</label>
            <select id="twohand-type" [ngModel]="formData().two_handed_damage!.damage_type?.index" (ngModelChange)="formData.update(d => ({ ...d, two_handed_damage: { ...d.two_handed_damage!, damage_type: { index: $event, name: $event, url: '/api/2014/damage-types/' + $event } } }))" name="twohandType">
              <option value="">Select type...</option>
              @for (dtype of damageTypes; track dtype.index) {
                <option [value]="dtype.index">{{ dtype.name }}</option>
              }
            </select>
          </div>
        </div>
      }
    </div>

    <div class="form-section">
      <h3>Details</h3>

      <div class="form-group">
        <label for="desc">Description</label>
        <textarea
          id="desc"
          class="description-textarea"
          [(ngModel)]="formData().desc![0]"
          name="desc"
          rows="8"
          placeholder="Describe the weapon..."
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cost-quantity">Cost</label>
          <div class="cost-input-group">
            <input
              id="cost-quantity"
              type="number"
              [(ngModel)]="formData().cost!.quantity"
              name="costQuantity"
              min="0"
              placeholder="0"
            />
            <select [(ngModel)]="formData().cost!.unit" name="costUnit">
              @for (unit of costUnits; track unit) {
                <option [value]="unit">{{ unit }}</option>
              }
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="weight">Weight</label>
          <input
            id="weight"
            type="number"
            [(ngModel)]="formData().weight"
            name="weight"
            min="0"
            step="0.1"
            placeholder="0"
          />
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>
      <button type="submit" class="submit-btn" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Creating...' : 'Create Weapon' }}
      </button>
    </div>
  </form>
</div>
