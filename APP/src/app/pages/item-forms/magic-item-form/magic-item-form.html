<div class="form-container">
  <h2>{{ isEditMode() ? 'Edit' : 'Create' }} Magic Item</h2>

  @if (error()) {
    <p class="error-message">{{ error() }}</p>
  }

  <form (ngSubmit)="onSubmit()">
    <div class="form-section">
      <h3>Basic Information</h3>

      <div class="form-group">
        <label for="name">Name *</label>
        <input
          id="name"
          type="text"
          [(ngModel)]="formData().name"
          name="name"
          required
          placeholder="e.g. Cloak of Protection, Staff of Power..."
        />
      </div>

      <div class="form-group">
        <label for="rarity">Rarity *</label>
        <select id="rarity" [(ngModel)]="formData().rarity!.name" name="rarity" required>
          @for (r of rarityOptions; track r) {
            <option [value]="r">{{ r }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="image">Image (PNG only)</label>
        <input
          id="image"
          type="file"
          accept=".png"
          (change)="onImageSelected($event)"
          class="file-input"
        />
            @if (imagePreview()) {
              <figure class="image-preview-figure">
                <img [src]="imagePreview()!" alt="Image preview" class="preview-img" />
                <figcaption>
                  @if (selectedFile) {
                    Nueva imagen (pendiente de guardar)
                  } @else if (isEditMode()) {
                    Imagen actual — selecciona un archivo para reemplazarla
                  } @else {
                    Vista previa
                  }
                </figcaption>
              </figure>
              @if (isEditMode() && selectedFile) {
                <button type="button" class="revert-image-btn" (click)="revertImage()">
                  ✕ Descartar nueva imagen
                </button>
              }
            }
      </div>
    </div>

    <div class="form-section">
      <h3>Details</h3>

      <div class="form-group">
        <label for="desc">Description</label>
        <textarea
          id="desc"
          class="description-textarea"
          [ngModel]="descString()"
          (ngModelChange)="descString.set($event)"
          name="desc"
          rows="8"
          placeholder="Describe the magic item and its properties..."
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cost-quantity">Cost</label>
          <div class="cost-input-group">
            <input
              id="cost-quantity"
              type="number"
              [(ngModel)]="formData().cost!.quantity"
              name="costQuantity"
              min="0"
              placeholder="0"
            />
            <select [(ngModel)]="formData().cost!.unit" name="costUnit">
              @for (unit of costUnits; track unit) {
                <option [value]="unit">{{ unit }}</option>
              }
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="weight">Weight</label>
          <input
            id="weight"
            type="number"
            [(ngModel)]="formData().weight"
            name="weight"
            min="0"
            step="0.1"
            placeholder="0"
          />
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>
      <button type="submit" class="submit-btn" [disabled]="isSubmitting()">
        {{ isSubmitting() ? (isEditMode() ? 'Updating...' : 'Creating...') : (isEditMode() ? 'Update Magic Item' : 'Create Magic Item') }}
      </button>
    </div>
  </form>
</div>
