<div class="form-container">
  <h2>Create Mount/Vehicle</h2>

  @if (error()) {
    <p class="error-message">{{ error() }}</p>
  }

  <form (ngSubmit)="onSubmit()">
    <div class="form-section">
      <h3>Basic Information</h3>

      <div class="form-group">
        <label for="name">Name *</label>
        <input
          id="name"
          type="text"
          [(ngModel)]="formData().name"
          name="name"
          required
          placeholder="e.g. Warhorse, Galley, Chariot..."
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="vehicle-category">Vehicle Category</label>
          <select id="vehicle-category" [(ngModel)]="formData().vehicle_category" name="vehicleCategory">
            <option value="">Select category...</option>
            @for (cat of vehicleCategories; track cat) {
              <option [value]="cat">{{ cat }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="capacity">Capacity</label>
          <input
            id="capacity"
            type="text"
            [(ngModel)]="formData().capacity"
            name="capacity"
            placeholder="e.g. 4 passengers"
          />
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>Speed</h3>

      <div class="form-group">
        <div class="speed-input-group">
          <input
            type="number"
            [(ngModel)]="formData().speed!.quantity"
            name="speedQuantity"
            min="0"
            placeholder="e.g. 60"
          />
          <select [(ngModel)]="formData().speed!.unit" name="speedUnit">
            @for (unit of speedUnits; track unit) {
              <option [value]="unit">{{ unit }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>Details</h3>

      <div class="form-group">
        <label for="desc">Description</label>
        <textarea
          id="desc"
          class="description-textarea"
          [(ngModel)]="formData().desc![0]"
          name="desc"
          rows="8"
          placeholder="Describe the mount or vehicle..."
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cost-quantity">Cost</label>
          <div class="cost-input-group">
            <input
              id="cost-quantity"
              type="number"
              [(ngModel)]="formData().cost!.quantity"
              name="costQuantity"
              min="0"
              placeholder="0"
            />
            <select [(ngModel)]="formData().cost!.unit" name="costUnit">
              @for (unit of costUnits; track unit) {
                <option [value]="unit">{{ unit }}</option>
              }
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="weight">Weight</label>
          <input
            id="weight"
            type="number"
            [(ngModel)]="formData().weight"
            name="weight"
            min="0"
            step="0.1"
            placeholder="0"
          />
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>
      <button type="submit" class="submit-btn" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Creating...' : 'Create Mount/Vehicle' }}
      </button>
    </div>
  </form>
</div>
